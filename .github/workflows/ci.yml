name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: 24

jobs:
  server:
    name: Server (lint, typecheck, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fluxion
          POSTGRES_PASSWORD: fluxion
          POSTGRES_DB: fluxion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fluxion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://fluxion:fluxion@localhost:5432/fluxion?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=server

      - name: Typecheck
        run: npm run typecheck --workspace=server

      - name: Test
        run: npm test --workspace=server

  web:
    name: Web (lint, typecheck, test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=web

      - name: Typecheck
        run: npm run typecheck --workspace=web

      - name: Test
        run: npm test --workspace=web
