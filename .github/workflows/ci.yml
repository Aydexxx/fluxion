name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  server:
    name: Server (lint, typecheck, test, build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fluxion
          POSTGRES_PASSWORD: fluxion
          POSTGRES_DB: fluxion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fluxion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://fluxion:fluxion@localhost:5432/fluxion?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm ci` runs the server postinstall (prisma generate); this is an explicit
      # belt-and-braces step so the generated client is always current with schema.
      - name: Prisma generate
        run: npm run prisma:generate --workspace=server

      - name: Lint
        run: npm run lint --workspace=server

      - name: Typecheck
        run: npm run typecheck --workspace=server

      # The full suite — auth, RBAC/sharing, audit, notifications, organization,
      # variables/secrets, sub-workflows, public API, integrations, templates
      # (built-in + user), profiles, the engine, queue, realtime, and schedulers.
      # The Vitest globalSetup provisions an isolated `fluxion_test` database from
      # the Prisma schema against the Postgres service container above.
      - name: Test
        run: npm test --workspace=server

      # Compile to dist so worker/server entrypoints are known to build.
      - name: Build
        run: npm run build --workspace=server

  web:
    name: Web (lint, typecheck, test, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=web

      - name: Typecheck
        run: npm run typecheck --workspace=web

      # The web suite — app shell/nav (desktop rail + mobile drawer), folder UX,
      # filter bar, user templates, profile, onboarding tour, editor stores, and
      # the shared UI kit — in jsdom.
      - name: Test
        run: npm test --workspace=web

      # Production build — catches landing-page/asset/bundling regressions the
      # unit tests don't (the web suite runs in jsdom, not a real bundle).
      - name: Build
        run: npm run build --workspace=web
