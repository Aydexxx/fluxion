  </defs>

  <rect width="1200" height="630" fill="#08080a" />
  <rect width="1200" height="630" fill="url(#bloom)" />
  <rect width="1200" height="630" fill="url(#spark)" />
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" stroke="#ffffff" stroke-opacity="0.06" />

  <!-- brand mark -->
  <g transform="translate(96, 96)">
    <path transform="scale(1.05)" fill="url(#violet)" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z" />
