  <g transform="translate(98, 540)">
    <circle cx="8" cy="8" r="8" fill="#8b7bff" />
    <circle cx="40" cy="8" r="8" fill="#4c9bff" />
    <circle cx="72" cy="8" r="8" fill="#c26bff" />
