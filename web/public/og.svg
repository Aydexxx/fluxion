  <text x="96" y="416" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="76" font-weight="600" fill="url(#ink)" letter-spacing="-2">on an infinite canvas.</text>

  <!-- subtitle -->
  <text x="98" y="486" font-family="'Inter', 'Segoe UI', sans-serif" font-size="27" fill="#8d8d99">Visual AI workflow studio — triggers, AI nodes, logic, and real-time execution.</text>

